<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap CSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"/>
    <link rel="stylesheet" href="alert.css"/>
</head>
<body>
    <br>
    <h3>Button group demo</h3>
    <div class="btn-group">
        <button class="btn btn-danger">One</button>
        <button class="btn btn-outline-warning">Two</button>
        <button class="btn btn-success">Three</button>
    </div>
    <div class="container">
        <button class="btn btn-success">One</button>
        <button class="btn btn-success">Two</button>
        <button class="btn btn-success">Three</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
