<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice-3</title>
</head>
<body>
    <form action="/action">
        <label for="FirstName"></label>
        <input type="text" id="FirstName" placeholder="Enter your first name here" name="firstname">
        <label for="LastName"></label>
        <input type="text" id="LastName" placeholder="Enter your last name here" name="lastname">
        <br>
        Please select your gender
        <select name="Gender" id="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Transgender">Transgender</option>
        </select>
        <br>
        Do you agree to all terms of service?
        <input type="checkbox" id="agree" name="agree" checked>
        <label for="agree">Yes, I Agree</label>
        <br>
        <button>Register</button>
    </form>
</body>
</html>
