<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox</title>
</head>
<body>
    <form action="/action">
        <input type="checkbox" id="age" name="age" checked>
        <label for="age">I am 18+</label>
        <div>
        <input type="radio" name="fruit" id="apple" value="apple">
        <label for="apple">Apple</label>
        <input type="radio" name="fruit" id="mango" value="mango">            
        <label for="mango">Mango</label>
        <input type="radio" name="fruit" id="banana" value="banana">
        <label for="banana">banana</label>
        </div>
        <button>Submit</button>
        </form>
        <br>
        <form action="/action">
            <select name="Fighter" id="Aircraft">
                <option value="Su-30 MKI">Sukohi-30 MKI</option>
                <option value="Rafale">Dassault Rafale-E</option>
                <option value="Mig-21" selected>Mig-21 Bison</option>
            </select>
            <div>
                <label for="vol">Select your volume level</label>
                <input type="range" id="vol" min="0" max="100" name="volume" step="10" value="40">
            </div>
            <div>
                <label for="feedback">Please provide your valuable feedback</label>
                <textarea id="feedback" placeholder="Write your feedback here"></textarea>
            </div>
            <button>submit</button>
        </form>
</body>
</html>
